<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#C8E6C9"/>

  <!-- Body/Head -->
  <ellipse cx="100" cy="115" rx="52" ry="55" fill="#5D4037"/>

  <!-- Chest -->
  <ellipse cx="100" cy="130" rx="30" ry="32" fill="#8D6E63"/>

  <!-- Ear tufts -->
  <polygon points="72,68 62,42 85,62" fill="#5D4037"/>
  <polygon points="128,68 138,42 115,62" fill="#5D4037"/>

  <!-- Big owl eyes -->
  <circle cx="83" cy="100" r="17" fill="#FFF9C4"/>
  <circle cx="117" cy="100" r="17" fill="#FFF9C4"/>
  <circle cx="83" cy="100" r="11" fill="#1565C0"/>
  <circle cx="117" cy="100" r="11" fill="#1565C0"/>
  <circle cx="83" cy="100" r="6" fill="#0D0D0D"/>
  <circle cx="117" cy="100" r="6" fill="#0D0D0D"/>
  <circle cx="85" cy="97" r="2.5" fill="white"/>
  <circle cx="119" cy="97" r="2.5" fill="white"/>

  <!-- Glasses over eyes -->
  <circle cx="83" cy="100" r="17" fill="none" stroke="#2C2C2C" stroke-width="3"/>
  <circle cx="117" cy="100" r="17" fill="none" stroke="#2C2C2C" stroke-width="3"/>
  <line x1="100" y1="100" x2="100" y2="100" stroke="#2C2C2C" stroke-width="3"/>
  <path d="M100 100 Q100 100 100 100" stroke="#2C2C2C" stroke-width="3"/>
  <line x1="66" y1="96" x2="52" y2="92" stroke="#2C2C2C" stroke-width="2.5"/>
  <line x1="134" y1="96" x2="148" y2="92" stroke="#2C2C2C" stroke-width="2.5"/>
  <line x1="100" y1="100" x2="100" y2="100"/>
  <!-- bridge -->
  <path d="M100 97 Q100 94 100 97" stroke="#2C2C2C" stroke-width="3" fill="none"/>
  <line x1="100" y1="97" x2="100" y2="97"/>

  <!-- Beak -->
  <polygon points="93,112 107,112 100,122" fill="#FF8F00"/>

  <!-- Graduation cap -->
  <rect x="65" y="62" width="70" height="12" rx="2" fill="#1a1a2e"/>
  <polygon points="100,42 65,62 100,72 135,62" fill="#1a1a2e"/>
  <!-- Tassel -->
  <line x1="135" y1="62" x2="148" y2="68" stroke="#F0C040" stroke-width="3"/>
  <circle cx="148" cy="72" r="5" fill="#F0C040"/>

  <!-- Wings hint -->
  <path d="M52 130 Q40 115 55 105" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M148 130 Q160 115 145 105" stroke="#5D4037" stroke-width="8" fill="none" stroke-linecap="round"/>
</svg>
